name: Provenance Integrity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependency
        run: python -m pip install --upgrade pip requests

      - name: Compile Python files
        run: python -m py_compile code/*.py

      - name: Verify provenance extraction and coverage
        run: python code/build_provenance_inputs.py --verify --audit

      - name: Verify claim traceability map is current
        run: python code/build_claim_traceability.py --check

      - name: Run provenance invariant tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run analysis scripts
        env:
          PROVENANCE_DISABLE_RUN_RECORD: "1"
        run: |
          python code/student_loans.py
          python code/rent_vs_own.py
          python code/historical.py
          python code/leasehold.py
          python code/subscriptions.py

      - name: Ensure generated artifacts are committed
        run: git diff --exit-code
